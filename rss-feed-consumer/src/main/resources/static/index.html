<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Feed Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: white;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #11998e;
        }
        
        .search-select {
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            min-width: 150px;
        }
        
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(56, 239, 125, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover,
        .filter-btn.active {
            border-color: #11998e;
            background: #11998e;
            color: white;
        }
        
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .article-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .article-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        
        .article-header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            padding: 12px 16px;
        }
        
        .feed-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .article-body {
            padding: 16px;
        }
        
        .article-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        
        .article-title a {
            color: inherit;
            text-decoration: none;
        }
        
        .article-title a:hover {
            color: #11998e;
        }
        
        .article-description {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 12px;
            max-height: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .article-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 12px;
        }
        
        .enrichment {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #555;
            border-left: 3px solid #11998e;
        }
        
        .enrichment-title {
            font-weight: 600;
            margin-bottom: 6px;
            color: #11998e;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(17, 153, 142, 0.3);
            border-radius: 50%;
            border-top-color: #11998e;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            text-align: center;
            flex: 1;
            min-width: 120px;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 0.875rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📰 News Feed Dashboard</h1>
            <p class="subtitle">Latest news from your RSS feeds</p>
        </header>
        
        <div class="card">
            <div class="search-box">
                <input type="text" id="searchPrompt" class="search-input" placeholder="Search for news (e.g., 'Find news about AI and technology')...">
                <select id="feedFilter" class="search-select">
                    <option value="">All Feeds</option>
                </select>
                <button class="btn btn-primary" onclick="searchNews()">Search</button>
            </div>
            
            <div class="filters" id="filters">
                <button class="filter-btn active" onclick="showAll()">All</button>
            </div>
            
            <div class="stats" id="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalArticles">0</div>
                    <div class="stat-label">Total Articles</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalFeeds">0</div>
                    <div class="stat-label">Sources</div>
                </div>
            </div>
            
            <div id="articlesContainer">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Loading articles...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allArticles = [];
        let feedKeys = new Set();
        
        async function loadNews() {
            try {
                const response = await fetch('/api/news');
                const articles = await response.json();
                allArticles = articles;
                
                feedKeys = new Set(articles.map(a => a.feedKey));
                
                document.getElementById('totalArticles').textContent = articles.length;
                document.getElementById('totalFeeds').textContent = feedKeys.size;
                
                updateFeedFilter();
                updateFilters();
                renderArticles(articles);
            } catch (error) {
                console.error('Error loading news:', error);
                document.getElementById('articlesContainer').innerHTML = 
                    '<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Error loading news</p></div>';
            }
        }
        
        function updateFeedFilter() {
            const select = document.getElementById('feedFilter');
            const currentValue = select.value;
            
            select.innerHTML = '<option value="">All Feeds</option>';
            
            feedKeys.forEach(key => {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = key;
                select.appendChild(option);
            });
            
            select.value = currentValue;
        }
        
        function updateFilters() {
            const filters = document.getElementById('filters');
            filters.innerHTML = '<button class="filter-btn active" onclick="showAll()">All</button>';
            
            feedKeys.forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.textContent = key;
                btn.onclick = () => filterByFeed(key);
                filters.appendChild(btn);
            });
        }
        
        function showAll() {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.filter-btn').classList.add('active');
            renderArticles(allArticles);
        }
        
        function filterByFeed(feedKey) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === feedKey) btn.classList.add('active');
            });
            
            const filtered = allArticles.filter(a => a.feedKey === feedKey);
            renderArticles(filtered);
        }
        
        async function searchNews() {
            const prompt = document.getElementById('searchPrompt').value.trim();
            const feedKey = document.getElementById('feedFilter').value;
            
            if (!prompt) {
                loadNews();
                return;
            }
            
            document.getElementById('articlesContainer').innerHTML = 
                '<div class="loading"><div class="loading-spinner"></div><p>Searching with AI...</p></div>';
            
            try {
                const request = {
                    prompt: prompt,
                    feedKey: feedKey || undefined
                };
                
                const response = await fetch('/api/news/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });
                
                const articles = await response.json();
                
                document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                renderArticles(articles);
                
                if (articles.length === 0) {
                    document.getElementById('articlesContainer').innerHTML = 
                        '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>No articles found matching your search</p></div>';
                }
            } catch (error) {
                console.error('Error searching:', error);
                document.getElementById('articlesContainer').innerHTML = 
                    '<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Error searching news</p></div>';
            }
        }
        
        function renderArticles(articles) {
            const container = document.getElementById('articlesContainer');
            
            if (articles.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📰</div><p>No articles found</p></div>';
                return;
            }
            
            container.innerHTML = '<div class="articles-grid">' + 
                articles.map(article => `
                    <div class="article-card">
                        <div class="article-header">
                            <span class="feed-badge">${article.feedKey}</span>
                        </div>
                        <div class="article-body">
                            <div class="article-title">
                                <a href="${article.link}" target="_blank" rel="noopener">${article.title}</a>
                            </div>
                            <div class="article-meta">
                                <span>📅 ${formatDate(article.publishedDate)}</span>
                                <span>📰 ${article.feedName}</span>
                            </div>
                            ${article.description ? `<div class="article-description">${article.description}</div>` : ''}
                            ${article.enrichedContent ? `
                                <div class="enrichment">
                                    <div class="enrichment-title">🤖 AI Summary</div>
                                    ${article.enrichedContent}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `).join('') + '</div>';
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return 'Unknown';
            const date = new Date(dateStr);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        
        document.getElementById('searchPrompt').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchNews();
        });
        
        document.getElementById('feedFilter').addEventListener('change', () => {
            const feedKey = document.getElementById('feedFilter').value;
            if (feedKey) {
                filterByFeed(feedKey);
            } else {
                showAll();
            }
        });
        
        loadNews();
    </script>
</body>
</html>
